        body { font-family: 'Inter', sans-serif; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-[#f8f9fb] z-40">
<div class="flex justify-between items-center px-6 py-4 max-w-2xl mx-auto">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors active-scale">
                    arrow_back
                </button>
<h1 class="text-xl font-bold text-[#191c1e] tracking-tight">Settings</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#1e52cc]">edit_note</span>
</div>
</div>
</header>
<main class="max-w-2xl mx-auto pb-12">
<!-- Profile Section -->
<section class="px-6 py-8 flex flex-col items-center">
<div class="relative mb-4 group">

<button class="absolute bottom-0 right-0 bg-primary text-on-primary p-1.5 rounded-full shadow-lg active-scale">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<h2 class="text-lg font-bold text-on-surface tracking-tight">Daily Curator</h2>
<div class="mt-1 flex items-center gap-2 px-4 py-1 rounded-full bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
<span class="text-sm text-on-surface-variant font-medium italic">"Mapping the digital soul..."</span>
<span class="material-symbols-outlined text-xs text-primary opacity-0 group-hover:opacity-100 transition-opacity">edit</span>
</div>
</section>
<!-- Settings List -->
<div class="px-4 space-y-2">
<!-- Category: Account -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<!-- Personal Info -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-low transition-colors active-scale text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">Personal Info</p>
<p class="text-[11px] text-on-surface-variant font-medium">Profile, email, and security</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">chevron_right</span>
</button>
<!-- AI Config -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-low transition-colors active-scale text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">AI Config</p>
<p class="text-[11px] text-on-surface-variant font-medium">Neural settings and awareness level</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">chevron_right</span>
</button>
</div>
<!-- Category: Schedule & Data -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<!-- AI Diary Time -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-low transition-colors active-scale text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">schedule</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">AI Diary Time</p>
<p class="text-[11px] text-on-surface-variant font-medium">Daily reflection window at 21:00</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">chevron_right</span>
</button>
<!-- Data Management -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-low transition-colors active-scale text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">database</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">Data Management</p>
<p class="text-[11px] text-on-surface-variant font-medium">Export, backup, and privacy</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">chevron_right</span>
</button>
</div>
<!-- Category: Info -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
<!-- About -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-low transition-colors active-scale text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">info</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">About</p>
<p class="text-[11px] text-on-surface-variant font-medium">AI Awareness Diary v1.0.4</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-lg">chevron_right</span>
</button>
</div>
</div>

<footer class="mt-12 px-6 text-center">
<div class="inline-flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-xl">auto_awesome</span>
<span class="font-bold text-on-surface text-sm tracking-tight">AI Awareness Diary</span>
</div>
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold opacity-40">Precision Architect System</p>
</footer>

<!-- Side Decoration (Web Only) -->
<div class="hidden md:block fixed right-12 top-1/2 -translate-y-1/2 w-48 space-y-4 pointer-events-none opacity-20">
<div class="h-1 bg-primary w-full rounded-full"></div>
<div class="h-1 bg-surface-container-highest w-3/4 rounded-full"></div>
