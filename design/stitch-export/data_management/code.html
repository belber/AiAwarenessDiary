<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数据管理 - AI Awareness Journal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "on-secondary-fixed": "#603328",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#6e0a12",
                        "outline-variant": "#b2b2ab",
                        "on-secondary": "#fff7f6",

                        "on-tertiary": "#fff7f3",
                        "tertiary-dim": "#56524f",
                        "secondary-fixed-dim": "#ffc8bb",
                        "background": "#fbf9f4",
                        "primary-dim": "#48574b",
                        "primary": "#546356",
                        "secondary-container": "#ffdad2",
                        "primary-container": "#d6e7d7",
                        "tertiary-fixed-dim": "#f7efeb",
                        "secondary": "#855245",
                        "inverse-surface": "#0e0e0c",
                        "surface": "#fbf9f4",
                        "error": "#a83836",
                        "inverse-primary": "#e7f8e8",
                        "surface-variant": "#e3e3db",
                        "on-primary-container": "#465549",
                        "primary-fixed": "#d6e7d7",
                        "surface-dim": "#dadad2",
                        "secondary-fixed": "#ffdad2",
                        "tertiary": "#635e5b",
                        "on-surface-variant": "#5e6059",
                        "on-tertiary-container": "#66615e",
                        "primary-fixed-dim": "#c8d9c9",
                        "surface-tint": "#546356",
                        "surface-container": "#efeee7",
                        "inverse-on-surface": "#9e9d99",
                        "on-primary-fixed": "#344337",
                        "surface-container-highest": "#e3e3db",
                        "error-container": "#fa746f",
                        "secondary-dim": "#77463a",
                        "surface-container-high": "#e9e8e1",
                        "on-secondary-container": "#764539",
                        "tertiary-container": "#ffffff",
                        "on-tertiary-fixed": "#544f4c",
                        "surface-container-low": "#f5f4ed",
                        "surface-bright": "#fbf9f4",
                        "on-primary": "#ecfded",
                        "on-primary-fixed-variant": "#505f53",
                        "on-error": "#fff7f6",
                        "on-background": "#31332e",
                        "tertiary-fixed": "#ffffff",
                        "on-secondary-fixed-variant": "#814e42",
                        "outline": "#7a7b75",
                        "on-tertiary-fixed-variant": "#716c69"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"

                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow { box-shadow: 0 12px 40px rgba(49, 51, 46, 0.05); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen selection:bg-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f4]/80 backdrop-blur-md">
<div class="flex items-center px-6 h-16 w-full max-w-screen-xl mx-auto justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/5 transition-colors duration-300">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline italic text-2xl tracking-tight text-primary">数据管理</h1>
</div>
<div class="hidden md:flex items-center gap-8 text-on-surface-variant font-label text-sm uppercase tracking-widest">
<span class="hover:text-primary transition-colors cursor-pointer">Security</span>
<span class="hover:text-primary transition-colors cursor-pointer">Storage</span>
<span class="text-primary font-bold">Cloud</span>
</div>
</div>
</header>
<main class="pt-24 pb-20 px-6 max-w-2xl mx-auto space-y-12">
<!-- Trust Section -->
<section class="relative overflow-hidden rounded-lg bg-surface-container-low p-8 editorial-shadow">
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative z-10 flex gap-6 items-start">
<div class="flex-shrink-0 w-12 h-12 bg-primary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<div class="space-y-2">
<h2 class="font-headline text-xl text-primary-dim italic">隐私承诺</h2>
<p class="text-on-surface-variant leading-relaxed font-body">数据保存在本地。应用没有服务端，不会收集你的数据。</p>
</div>
</div>
</section>
<!-- Main Actions: Local Operations -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4">
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest rounded-lg editorial-shadow hover:bg-primary transition-all duration-500 hover:-translate-y-1">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container group-hover:bg-on-primary/20 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-on-primary">upload_file</span>
</div>
<span class="font-label font-medium group-hover:text-on-primary">备份数据</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-primary/60">arrow_forward</span>
</button>
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest rounded-lg editorial-shadow hover:bg-tertiary transition-all duration-500 hover:-translate-y-1">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high group-hover:bg-on-tertiary/20 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-tertiary group-hover:text-on-tertiary">settings_backup_restore</span>
</div>
<span class="font-label font-medium group-hover:text-on-tertiary">恢复数据</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-on-tertiary/60">arrow_forward</span>
</button>
</section>
<!-- S3 Sync Section (Expanded State) -->
<section class="space-y-6">
<div class="flex items-center justify-between px-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">cloud_sync</span>
<h3 class="font-headline text-2xl italic tracking-tight text-on-surface">S3 / 兼容对象存储同步</h3>
</div>
<span class="material-symbols-outlined text-outline">expand_less</span>
</div>
<div class="bg-surface-container rounded-lg p-8 space-y-8 editorial-shadow border border-white/40">
<!-- Toggle -->
<div class="flex items-center justify-between">
<label class="font-label text-on-surface font-semibold tracking-wide">开启同步</label>
<div class="w-12 h-6 bg-primary rounded-full relative flex items-center px-1 cursor-pointer">
<div class="w-4 h-4 bg-white rounded-full translate-x-6"></div>
</div>
</div>
<!-- Fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="space-y-1.5">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Endpoint</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body transition-colors outline-none text-on-surface" placeholder="https://s3.amazonaws.com" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Bucket</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body transition-colors outline-none text-on-surface" placeholder="my-journal-vault" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Region</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body transition-colors outline-none text-on-surface" placeholder="ap-northeast-1" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Auto-sync</label>
<div class="relative">
<select class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body appearance-none outline-none text-on-surface">
<option>每1小时</option>
<option>每12小时</option>
<option>每天</option>
<option>手动</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-2 text-xs pointer-events-none">unfold_more</span>
</div>
</div>
<div class="space-y-1.5 md:col-span-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Access Key</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body transition-colors outline-none text-on-surface" type="password" value="AKIAIOSFODNN7EXAMPLE"/>
</div>
<div class="space-y-1.5 md:col-span-2">
<label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold ml-1">Secret Key</label>
<input class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary focus:ring-0 px-1 py-2 font-body transition-colors outline-none text-on-surface" type="password" value="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"/>
</div>
</div>
<!-- Info & Actions -->
<div class="pt-4 space-y-6">
<div class="flex items-center gap-2 text-sm text-on-surface-variant font-body italic opacity-80">
<span class="material-symbols-outlined text-[18px]">history</span>
                        最近一次同步时间: 2026-04-12 10:30
                    </div>
<div class="flex flex-wrap gap-4 pt-2">
<button class="bg-primary text-on-primary px-8 py-3 rounded-full font-label font-semibold shadow-lg shadow-primary/10 hover:bg-primary-dim transition-all active:scale-95">
                            测试并保存
                        </button>
<button class="bg-surface-container-high text-primary px-8 py-3 rounded-full font-label font-semibold hover:bg-primary-container transition-all active:scale-95">
                            立即同步
                        </button>
</div>
</div>
</div>
</section>
<!-- Decorative Footer -->
<footer class="pt-8 text-center">
<p class="font-headline italic text-on-surface-variant/40 text-sm tracking-widest">Digital Sanctuary — Your Data, Your Peace</p>
</footer>
</main>
<!-- Bottom Separation using Tonal Shifts (No lines) -->
<div class="fixed bottom-0 w-full h-4 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
</body></html>
