<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Awareness Diary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "secondary-fixed": "#ffdad2",

                    "on-error": "#fff7f6",
                    "error": "#a83836",
                    "inverse-on-surface": "#9e9d99",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#7a7b75",
                    "surface-container-high": "#e9e8e1",
                    "surface-dim": "#dadad2",
                    "surface-container": "#efeee7",
                    "surface-bright": "#fbf9f4",
                    "tertiary-container": "#ffffff",

                    "on-tertiary-container": "#66615e",

                    "on-secondary": "#fff7f6",

            "borderRadius": {

                    "full": "9999px"

            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"]
            }
          },
        },
      }

<style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #fbf9f4;
        color: #31332e;
      }
      .font-serif-italic {
        font-family: 'Newsreader', serif;
        font-style: italic;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-primary-container">
<!-- Top Navigation Shell -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-lg">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest">
<img alt="林间" class="w-full h-full object-cover" data-alt="portrait of a serene person in a minimal studio setting with soft natural light and neutral tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwaIM4ot2AFL8C_adg3EzLmLTyIgnVZZ_FrniTk-5cVLWSLWS2ez3Pi6Byc-3ivmfghEPypl7qn3K0MRXrSD3Z8FaOLbNaBIBswL3W5--4LcMpc6XGEHYy8Dv8qUfH4ZUoMqe0lqqsPVlmxGi6txDpZ5yW3Xinz01OIsc1NLN1cXDvYqfIL6z5Nnu-2bIqqh65geJRw4_hv3ILI_pkOBnMv0JUJISkuBS8QYQplh3WLJKJG6jD2coZPTD7M-LqcpZq5kxAqG445NMu"/>
</div>
<div class="flex flex-col">
<span class="font-body text-sm font-semibold tracking-tight text-on-surface">林间</span>
<span class="font-serif-italic text-xs text-on-surface-variant">2026年4月12日 周日</span>
</div>
</div>
<nav class="flex items-center gap-2">
<button class="px-5 py-2 rounded-full bg-surface-container-high text-primary font-body text-sm hover:bg-primary-container transition-all duration-300">回顾</button>
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-300">
<span class="material-symbols-outlined text-xl">settings</span>
</button>
</nav>
</div>
</header>
<main class="max-w-screen-sm mx-auto px-6 pt-28 pb-32">
<!-- Daily Progress -->
<div class="mb-12 text-center">
<p class="font-body text-sm text-on-surface-variant tracking-widest uppercase">今天已记录 3 次</p>
<div class="mt-4 flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<!-- Timeline Content -->
<div class="space-y-12">
<!-- Afternoon Section -->
<section class="relative">
<div class="flex items-center justify-center mb-8">
<div class="h-[1px] w-8 bg-surface-container-highest"></div>
<span class="mx-4 font-serif-italic text-on-surface-variant text-lg">下午</span>
<div class="h-[1px] w-8 bg-surface-container-highest"></div>
</div>
<div class="space-y-6">
<!-- Card 1 -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_12px_40px_rgba(49,51,46,0.03)] border border-surface-container-high/20">
<div class="flex items-baseline justify-between mb-3">
<span class="font-serif-italic text-sm text-on-surface-variant">14:20</span>
<span class="material-symbols-outlined text-primary/40 text-lg">ecg_heart</span>
</div>
<p class="font-body text-on-surface leading-relaxed text-lg">呼吸有点急促，感觉到心跳。</p>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_12px_40px_rgba(49,51,46,0.03)] border border-surface-container-high/20">
<div class="flex items-baseline justify-between mb-3">
<span class="font-serif-italic text-sm text-on-surface-variant">15:05</span>
<span class="material-symbols-outlined text-primary/40 text-lg">air</span>
</div>
<p class="font-body text-on-surface leading-relaxed text-lg">窗外的风吹动了窗帘，那一刻觉得很平静。</p>
</div>
</div>
</section>
<!-- Evening Section -->
<section class="relative">
<div class="flex items-center justify-center mb-8">
<div class="h-[1px] w-8 bg-surface-container-highest"></div>
<span class="mx-4 font-serif-italic text-on-surface-variant text-lg">傍晚</span>
<div class="h-[1px] w-8 bg-surface-container-highest"></div>
</div>
<div class="space-y-6">
<!-- Card 3 -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-[0_12px_40px_rgba(49,51,46,0.03)] border border-surface-container-high/20">
<div class="flex items-baseline justify-between mb-3">
<span class="font-serif-italic text-sm text-on-surface-variant">18:30</span>
<span class="material-symbols-outlined text-secondary/40 text-lg">bedtime</span>
</div>
<p class="font-body text-on-surface leading-relaxed text-lg">工作结束后的疲惫感。</p>
</div>
</div>
</section>
<!-- AI Generation Card -->
<section class="mt-16 pt-8 border-t border-surface-container-highest">
<div class="relative overflow-hidden bg-primary-container/30 p-8 rounded-xl text-center">
<div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 20% 20%, #546356 0%, transparent 50%);"></div>
<div class="relative z-10">
<span class="material-symbols-outlined text-primary text-3xl mb-4" data-weight="fill">auto_awesome</span>
<h3 class="font-serif-italic text-2xl text-on-primary-container mb-6">今日觉察之旅接近尾声</h3>
<button class="w-full py-4 bg-primary text-on-primary rounded-full font-body font-semibold tracking-wide hover:bg-primary-dim transition-colors duration-300">
              生成今日 AI日记
            </button>
</div>
</div>
</section>
</div>
</main>
<!-- Permanent Bottom Input Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 p-6">
<div class="max-w-screen-sm mx-auto">
<div class="bg-white/80 backdrop-blur-xl rounded-full p-2 shadow-[0_-12px_40px_rgba(49,51,46,0.05)] border border-surface-container-highest flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center text-primary-dim">
<span class="material-symbols-outlined">mic</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body text-sm text-on-surface placeholder:text-on-surface-variant/50 px-2" placeholder="此刻感觉到什么？用语音输入会更快" type="text"/>
<button class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-body text-sm font-semibold hover:bg-primary-dim transition-all duration-300 active:scale-95">
          发送
        </button>
</div>
<!-- Virtual Indicator for Mobile Spacing -->
<div class="h-2"></div>
</div>
</footer>
</body></html>
